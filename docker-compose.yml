version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: agendly-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: agendly
    volumes:
      - ./data/db:/data/db
      - ./data/configdb:/data/configdb
    networks:
      - agendly-network

networks:
  agendly-network:
    driver: bridge

volumes:
  mongodb-data:
